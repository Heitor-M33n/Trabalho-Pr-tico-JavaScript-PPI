<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Quiz dos países</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="fundo-animado"></div>
    <!-- MÚSICA -->

    <audio
        id="bgMusic"
        loop
        autoplay
        muted
    >

        <source
        src="music/ambient.mp3"
        type="audio/mpeg">

    </audio>

    <!-- BOTÃO -->

    <button id="musicBtn">
        🔊
    </button>
    <!-- CONTEUDO DO CORPO -->
    <div class="container">

        <h1>🌍 Quiz dos Países</h1>

        <p>
            Teste seus conhecimentos sobre bandeiras
            do mundo inteiro!
        </p>

        <button id="btnStart">
            Começar Jornada
        </button>

    </div>

    <script src="index.js"></script>

</body>
</html>
