<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Quiz dos países</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <header>
        <h3 style="display: inline;" id="acertos"></h3>
        <h3 style="display: inline;" id="contador"></h3>
    </header>
    <h1>Que país é esse?</h1>

<form id="form">

    <!-- IMAGEM -->

    <img
    src=""
    id="flag"
    class="flag-image">

    <!-- GRID -->

    <div class="answers">

        <label class="options">

            <input
            type="radio"
            id="A"
            name="country"
            value="A">

            <span id="LabelA">
                A -
            </span>

        </label>

                <label class="options">

            <input
            type="radio"
            id="B"
            name="country"
            value="B">

            <span id="LabelB">
                B -
            </span>

        </label>

                <label class="options">

            <input
            type="radio"
            id="C"
            name="country"
            value="C">

            <span id="LabelC">
                C -
            </span>

        </label>

                <label class="options">

            <input
            type="radio"
            id="D"
            name="country"
            value="D">

            <span id="LabelD">
                D -
            </span>

        </label>

    </div>

    <input
    type="submit"
    value="Confirmar resposta"
    id="submit">

    <script src="scripts.js"></script>
</form>
</body>
</html>
